applications:
  - name: nginx-ingress
    namespace: ingress-nginx
    project: default
    destination: https://kubernetes.default.svc
    repoURL: https://kubernetes.github.io/ingress-nginx
    targetRevision: 4.11.3
    chart: ingress-nginx
    helmValues: |
      controller:
        service:
          type: LoadBalancer
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true

  - name: helm-argocd-dev
    namespace: helm-argocd-dev
    project: default
    destination: https://kubernetes.default.svc
    repoURL: https://priyanshu3103.github.io/helm-charts
    targetRevision: 0.2.4
    chart: helm-argocd
    helmValues: |
      ingress:
        enabled: true
        className: "nginx"
        annotations:
          kubernetes.io/ingress.class: "nginx"
        hosts:
          - host: helm-argocd.local
            paths:
              - path: /
                pathType: Prefix
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true