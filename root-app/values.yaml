applications:
  - name: jenkins
    namespace: jenkins
    project: default
    destination: https://kubernetes.default.svc
    repoURL: https://priyanshu3103.github.io/helm-charts
    targetRevision: 0.1.0
    chart: jenkins
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true