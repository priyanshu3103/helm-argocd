apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.applicationSet.name }}
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          {{- range .Values.applicationSet.apps }}
          - name: {{ .name }}
            namespace: {{ .namespace }}
            chart: {{ .chart }}
            version: {{ .version | quote }}
          {{- end }}
  template:
    metadata:
      name: "{{`{{name}}`}}"
    spec:
      project: default
      source:
        repoURL: {{ .Values.applicationSet.chartsRepo }}
        chart: "{{`{{chart}}`}}"
        targetRevision: "{{`{{version}}`}}"
        helm:
          valueFiles:
            - $values/apps/{{`{{name}}`}}/values.yaml
      sources:
        - repoURL: {{ .Values.applicationSet.chartsRepo }}
          chart: "{{`{{chart}}`}}"
          targetRevision: "{{`{{version}}`}}"
        - repoURL: {{ .Values.applicationSet.repo }}
          targetRevision: {{ .Values.applicationSet.revision }}
          ref: values
        - repoURL: {{ .Values.applicationSet.repo }}
          targetRevision: {{ .Values.applicationSet.revision }}
          path: appconfig/{{`{{name}}`}}-config.yaml
          ref: appconfig
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{`{{namespace}}`}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          {{- if .syncOptions }}
          {{- toYaml .syncOptions | nindent 4 }}
          {{- end }}