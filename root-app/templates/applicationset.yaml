apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.applicationSet.name }}
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: {{ .Values.applicationSet.repo }}
        revision: {{ .Values.applicationSet.revision }}
        files:
          - path: "apps/tool-list.yaml"
  template:
    metadata:
      name: "{{`{{name}}`}}"
    spec:
      project: default
      sources:
        - repoURL: {{ .Values.applicationSet.chartsRepo }}
          chart: "{{`{{chart}}`}}"
          targetRevision: "{{`{{version}}`}}"
          helm:
            valueFiles:
              - $values/apps/{{`{{name}}`}}/values.yaml
        - repoURL: {{ .Values.applicationSet.repo }}
          targetRevision: {{ .Values.applicationSet.revision }}
          ref: values
        - repoURL: {{ .Values.applicationSet.repo }}
          targetRevision: {{ .Values.applicationSet.revision }}
          path: appconfig/{{`{{name}}`}}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{`{{namespace}}`}}"
      syncPolicy:
        automated:
          selfHeal: "{{`{{disableAutoSync}}`}}" != "true"
          prune: "{{`{{disableAutoSync}}`}}" != "true"
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true