ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - hosts:
        - k8sdashboard.localhost
      # If you don't have a real cert, Traefik uses its default self-signed one
      secretName: k8s-dashboard-tls 