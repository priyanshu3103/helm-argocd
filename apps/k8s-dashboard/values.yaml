# values.yaml
args:
  - --namespace=devops-tools
  - --enable-insecure-login
  - --insecure-bind-address=0.0.0.0
  - --insecure-port=9090
  - --port=0  # Disable HTTPS port

service:
  name: k8s-dashboard
  type: ClusterIP
  portname: http
  protocol: TCP
  port: 9090
  targetPort: 9090

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "false"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix

# Override liveness probe to use HTTP
livenessProbe:
  httpGet:
    scheme: HTTP
    port: 9090
    path: /
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    scheme: HTTP
    port: 9090
    path: /
  initialDelaySeconds: 30
  periodSeconds: 10