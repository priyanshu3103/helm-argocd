ingress:
  enabled: true
  entryPoints:
    - web
  scheme: http  # Force HTTP (critical for insecure dashboard)
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix
  # Optional: Add middlewares if needed
  # middlewares:
  #   - name: my-middleware
  #     namespace: default
  annotations: {}
  # Additional annotations if needed
  # traefik.ingress.kubernetes.io/router.entrypoints: web

service:
  type: ClusterIP
  port: 9090
  targetPort: 9090  # Make sure this is explicit
  # Remove any annotations from service section
  annotations: {}

args:
  - --namespace=devops-tools
  - --enable-insecure-login
  - --insecure-bind-address=0.0.0.0
  - --insecure-port=9090
  - --port=0  # Disable HTTPS port

# Override liveness/readiness probes
# In your values.yaml
# Liveness probe configuration
livenessProbe:
  path: "/"
  port: 9090
  scheme: "HTTP"
  initialDelaySeconds: 30
  timeoutSeconds: 30
  periodSeconds: 10
  failureThreshold: 3

# Readiness probe configuration (if your chart has it)
readinessProbe:
  path: "/"
  port: 9090
  scheme: "HTTP"
  initialDelaySeconds: 30
  timeoutSeconds: 30
  periodSeconds: 10
  failureThreshold: 3