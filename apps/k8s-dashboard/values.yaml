ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "false"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    # Delete the serverstransport annotation entirely
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix

service:
  type: ClusterIP
  port: 9090  # Must match your insecure port