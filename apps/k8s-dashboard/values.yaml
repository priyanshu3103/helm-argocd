ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - k8sdashboard.localhost
      # If you don't have a real cert, Traefik uses its default self-signed one
      secretName: k8s-dashboard-tls 