ingress:
  enabled: true
  className: "traefik"
  annotations:
    # This is the "magic" line for Traefik to fix the 500 error
    traefik.ingress.kubernetes.io/service.serversscheme: "http"
    traefik.ingress.kubernetes.io/router.tls: "false"
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: k8s-dashboard
              port:
                number: 8443 