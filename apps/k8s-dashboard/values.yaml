ingress:
  enabled: true
  className: "traefik"
  annotations:
  traefik.ingress.kubernetes.io/router.entrypoints: web
  # Ensure Traefik knows this is a secure backend
  traefik.ingress.kubernetes.io/service.serversscheme: https
  # Link to your transport (matches your successful log state)
  traefik.ingress.kubernetes.io/service.serverstransport: devops-tools-k8s-dashboard-insecure-transport@kubernetescrd

  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: k8s-dashboard
              port:
                number: 8443