ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: traefik   # 🔥 ADD THIS
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: true
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: k8s-dashboard-insecure-transport@kubernetescrd

  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: ImplementationSpecific
service:
  port: 8443