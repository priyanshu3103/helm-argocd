ingress:
  enabled: true
  className: "traefik"
  annotations:
    # CHANGE THIS: Allow traffic on HTTPS (websecure)
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    
    # Enable TLS termination at Traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
    
    # Keep these (Backend Connection Settings)
    traefik.ingress.kubernetes.io/service.serversscheme: https

  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: k8s-dashboard
              port:
                number: 8443