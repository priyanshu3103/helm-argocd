ingress:
  enabled: true
  host: k8sdashboard.localhost
  entryPoints:
    - websecure  # HTTPS entry point
  scheme: https
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
  # Additional annotations if needed
  # traefik.ingress.kubernetes.io/router.entrypoints: web

service:
  type: ClusterIP
  port: 8443
  targetPort: 8443
  annotations: {}

args:
  - --namespace=devops-tools
  - --auto-generate-certificates  # Auto-generate self-signed cert
  - --bind-address=0.0.0.0
  - --port=8443  # Use HTTPS port

# Override liveness/readiness probes
# In your values.yaml
livenessProbe:
  path: "/"
  port: 8443
  scheme: "HTTPS"
  initialDelaySeconds: 30
  timeoutSeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  path: "/"
  port: 8443
  scheme: "HTTPS"
  initialDelaySeconds: 30
  timeoutSeconds: 30
  periodSeconds: 10
  failureThreshold: 3

serviceAccount:
  create: true
  name: k8s-dashboard-admin  # Optional, will use fullname if not set

# RBAC configuration
rbac:
  create: true
  clusterRole: "cluster-admin"  # Optional, defaults to cluster-admin
