ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    traefik.ingress.kubernetes.io/router.tls: "false"
    traefik.ingress.kubernetes.io/service.serversscheme: "http"
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix

service:
  type: ClusterIP
  port: 9090
  targetPort: 9090  # Make sure this is explicit
  # Remove any annotations from service section
  annotations: {}

args:
  - --namespace=devops-tools
  - --enable-insecure-login
  - --insecure-bind-address=0.0.0.0
  - --insecure-port=9090
  - --port=0  # Disable HTTPS port

# Override liveness/readiness probes
# In your values.yaml
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 30
  failureThreshold: 3
  httpGet:
    path: /
    port: 9090
    scheme: HTTP

readinessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 30
  failureThreshold: 3
  httpGet:
    path: /
    port: 9090
    scheme: HTTP