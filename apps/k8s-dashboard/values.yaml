ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: devops-tools-k8s-dashboard-insecure-transport@kubernetescrd

  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix

  tls:
    - hosts:
        - k8sdashboard.localhost

service:
  port: 8443