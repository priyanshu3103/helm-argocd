ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "false"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    traefik.ingress.kubernetes.io/service.serversscheme: "https"
  hosts:
    - host: k8sdashboard.localhost
      paths:
        - path: /
          pathType: Prefix
service:
  type: ClusterIP
  port: 8443