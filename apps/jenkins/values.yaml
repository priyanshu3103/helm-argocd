# apps/jenkins/values.yaml
# For YOUR custom chart - NO controller section

ingress:
  enabled: true
  className: ""
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "false"
  hosts:
    - host: jenkins.localhost
      paths:
        - path: /
          pathType: Prefix

# Your chart uses these directly
replicaCount: 1

# Resource overrides for Jenkins controller pod
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Probe overrides
startupProbe:
  httpGet:
    path: /login
    port: 8080
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /login
    port: 8080
  initialDelaySeconds: 120
  timeoutSeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /login
    port: 8080
  initialDelaySeconds: 60
  timeoutSeconds: 5
  periodSeconds: 10

# Agent resources override (this goes into casc ConfigMap)
casc:
  jenkins.yaml: |
    jenkins:
      clouds:
        - kubernetes:
            templates:
              - name: "jenkins-agent"
                containers:
                  - name: "jnlp"
                    resourceRequestCpu: "200m"
                    resourceRequestMemory: "512Mi"
                    resourceLimitCpu: "1000m"
                    resourceLimitMemory: "1Gi"