# Override the fullname to just "jenkins"
nameOverride: ""
fullnameOverride: ""

ingress:
  enabled: true
  className: ""
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "false"
  hosts:
    - host: jenkins.localhost
      paths:
        - path: /
          pathType: Prefix

# Deployment strategy overrides
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# Your chart uses these directly
replicaCount: 1
revisionHistoryLimit: 4
# Resource overrides for Jenkins controller pod
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi


probes:
  startupProbe:
    httpGet:
      path: /login
      port: 8080
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    httpGet:
      path: /login
      port: 8080
    initialDelaySeconds: 60
    timeoutSeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /login
      port: 8080
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10


# Cloud configuration overrides
cloud:
  serverUrl: "https://kubernetes.default.svc"
  skipTlsVerify: false  # Change to false if needed
  connectTimeout: 5     # Increase timeout
  readTimeout: 15        # Increase timeout
  containerCapStr: 10  # Increase container capacity
  podRetention: "never" # Change pod retention policy

# Agent configuration overrides
agent:
  label: "jenkins-agent"
  idleMinutes: 5
  image: "priyanshu30/jenkins-mysql:tag-2"
  workingDir: "/home/jenkins/agent"
  ttyEnabled: false
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"