# apps/jenkins/values.yaml
# For YOUR custom chart - NO controller section

ingress:
  enabled: true
  className: ""
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "false"
  hosts:
    - host: jenkins.localhost
      paths:
        - path: /
          pathType: Prefix

# Your chart uses these directly
replicaCount: 1

# Resource overrides for Jenkins controller pod
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Probe overrides
startupProbe:
  httpGet:
    path: /login
    port: 8080
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /login
    port: 8080
  initialDelaySeconds: 120
  timeoutSeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /login
    port: 8080
  initialDelaySeconds: 60
  timeoutSeconds: 5
  periodSeconds: 10


# Cloud configuration overrides
cloud:
  serverUrl: "https://kubernetes.default.svc"
  skipTlsVerify: false  # Change to false if needed
  connectTimeout: 10     # Increase timeout
  readTimeout: 30        # Increase timeout
  containerCapStr: "20"  # Increase container capacity
  podRetention: "always" # Change pod retention policy

# Agent configuration overrides
agent:
  label: "custom-jenkins-agent"
  idleMinutes: 10
  image: "priyanshu30/jenkins-mysql:custom-tag"
  workingDir: "/opt/jenkins/agent"
  ttyEnabled: false
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"